<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi PPK PP BBWS Serayu Opak</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --pu-blue: #003366; --pu-yellow: #ffcc00; --bg-color: #f4f7f6; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; height: 100vh; }
        .navbar { background-color: var(--pu-blue); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .navbar-brand { font-size: 20px; font-weight: bold; color: var(--pu-yellow); }
        .nav-btn { background: none; border: none; color: white; cursor: pointer; padding: 8px 15px; border-radius: 5px; }
        .nav-btn.active { background-color: rgba(255, 255, 255, 0.2); color: var(--pu-yellow); }
        
        .page-section { display: none; flex-grow: 1; }
        .page-section.active { display: flex; }
        
        .sidebar { width: 350px; background: white; height: 100%; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #eceff1; border-bottom: 1px solid #ddd; }
        .search-box { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .menu-container { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .year-btn { background: var(--pu-blue); color: white; width: 100%; text-align: left; padding: 12px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .package-list { display: none; padding: 5px 10px 15px 10px; }
        .item-paket { background: #f9f9f9; border-left: 4px solid var(--pu-yellow); padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        
        #map { flex-grow: 1; height: 100%; }
        .custom-popup { max-width: 280px; font-size: 13px; }
        .custom-popup h3 { color: var(--pu-blue); margin: 0 0 5px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .foto-dokumentasi { width: 100%; border-radius: 4px; margin-top: 8px; display: block; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Sistem Informasi PPK PP BBWS Serayu Opak</div>
    <div class="nav-menu">
        <button class="nav-btn active" onclick="bukaHalaman('page-beranda', this)">Beranda</button>
        <button class="nav-btn" onclick="bukaHalaman('page-dashboard', this)">Dashboard Peta</button>
    </div>
</nav>

<div id="page-beranda" class="page-section active">
    <div style="margin: auto; background: white; padding: 40px; border-radius: 10px; text-align: center; max-width: 600px;">
        <h1>Portal Data PPK PP</h1>
        <p>WebGIS sederhana untuk inventarisasi paket pekerjaan BBWS Serayu Opak.</p>
        <button style="background: var(--pu-yellow); padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="bukaHalaman('page-dashboard', document.querySelectorAll('.nav-btn')[1])">Masuk ke Peta</button>
    </div>
</div>

<div id="page-dashboard" class="page-section">
    <div class="sidebar">
        <div class="sidebar-header"><input type="text" id="searchInput" class="search-box" placeholder="Cari paket..." onkeyup="filterMenu()"></div>
        <div class="menu-container" id="menu-container"></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([-7.5, 110], 9);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    const markers = [];
    const csvUrl = 'data/paket.csv'; // Lokasi file CSV Anda di GitHub

    // Fungsi membaca CSV
    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            const data = results.data;
            bangunDashboard(data);
        }
    });

    function bangunDashboard(data) {
        const menuContainer = document.getElementById('menu-container');
        const dataPerTahun = { 2024: [], 2025: [], 2026: [] };

        data.forEach(item => {
            if (item.tahun && dataPerTahun[item.tahun]) {
                dataPerTahun[item.tahun].push(item);
            }
        });

        for (const tahun in dataPerTahun) {
            if (dataPerTahun[tahun].length > 0) {
                const btnTahun = document.createElement('button');
                btnTahun.className = 'year-btn';
                btnTahun.innerText = `📁 Tahun ${tahun}`;
                
                const listWadah = document.createElement('div');
                listWadah.className = 'package-list';
                btnTahun.onclick = () => listWadah.style.display = (listWadah.style.display === 'block' ? 'none' : 'block');

                dataPerTahun[tahun].forEach(item => {
                    const popupContent = `
                        <div class="custom-popup">
                            <h3>${item.judul}</h3>
                            <b>Lokasi:</b> ${item.lokasi}<br>
                            <b>Deskripsi:</b> ${item.deskripsi}<br>
                            <b>Output:</b> ${item.output}<br>
                            <img src="${item.foto}" class="foto-dokumentasi" onerror="this.style.display='none'">
                        </div>`;
                    
                    const marker = L.marker([item.lat, item.long]).addTo(map).bindPopup(popupContent);
                    
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item-paket';
                    itemDiv.innerHTML = `<b>${item.judul}</b><br><small>${item.tipe}</small>`;
                    itemDiv.onclick = () => {
                        map.flyTo([item.lat, item.long], 15);
                        marker.openPopup();
                    };
                    listWadah.appendChild(itemDiv);
                });
                menuContainer.appendChild(btnTahun);
                menuContainer.appendChild(listWadah);
            }
        }
    }

    function bukaHalaman(id, btn) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if (id === 'page-dashboard') setTimeout(() => map.invalidateSize(), 300);
    }
</script>
</body>
</html>
